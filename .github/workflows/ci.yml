name: Integration Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint for Code Quality
      run: npm run lint
      continue-on-error: true # While fixing issues, we might want this to not strictly fail

    - name: TypeScript Compiler Check (No Emit)
      run: npx tsc --noEmit

    - name: Run Vitest Unit Tests
      run: npm run test

    - name: Verify Build Integrity
      run: npm run build
